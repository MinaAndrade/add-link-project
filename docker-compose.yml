services:
  postgres:
    image: postgres:16-alpine
    container_name: addlink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: addlink
    ports:
      - "5432:5432"
    volumes:
      - addlink_pg_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: addlink-server
    depends_on:
      - postgres
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/addlink
    ports:
      - "3333:3333"

  web:
    build:
      context: ./web
    container_name: addlink-web
    depends_on:
      - server
    ports:
      - "5173:5173"

volumes:
  addlink_pg_data:
